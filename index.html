<style>
*{margin:0;padding:0;box-sizing:border-box;scroll-behavior:smooth}
body{
  font-family:Arial,sans-serif;
  background:#03040d;
  color:white;
  overflow-x:hidden;
}
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:
    linear-gradient(rgba(0,247,255,.06) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,47,139,.05) 1px,transparent 1px);
  background-size:50px 50px;
  z-index:-3;
}
body::after{
  content:"";
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 20% 20%,#ff2f8b33,transparent 35%),
    radial-gradient(circle at 80% 40%,#00f7ff33,transparent 35%),
    radial-gradient(circle at center,#1521ff44,transparent 45%);
  z-index:-2;
}

nav{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  padding:18px 7%;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:rgba(3,4,13,.75);
  backdrop-filter:blur(15px);
  border-bottom:1px solid #00f7ff33;
  z-index:1000;
}
.logo{
  font-size:24px;
  letter-spacing:4px;
  font-weight:bold;
  color:#fff;
  text-shadow:0 0 15px #00f7ff;
}
nav a{
  color:white;
  text-decoration:none;
  margin-left:22px;
  font-size:14px;
}
nav a:hover{color:#00f7ff}

.hero{
  min-height:100vh;
  display:grid;
  grid-template-columns:1.1fr .9fr;
  align-items:center;
  gap:40px;
  padding:120px 7% 60px;
}
.hero-text{
  text-align:left;
}
.hero h1{
  font-size:clamp(70px,12vw,150px);
  letter-spacing:12px;
  line-height:.9;
  text-shadow:0 0 30px #00f7ff;
}
.hero h1 span{color:#ff2f8b}
.badge{
  display:inline-block;
  margin:25px 0;
  padding:12px 22px;
  border:1px solid #ff2f8b;
  color:#ff2f8b;
  background:#ff2f8b14;
  box-shadow:0 0 25px #ff2f8b55;
}
.hero p{
  margin:0;
  max-width:620px;
  color:#d8d8ff;
  line-height:1.8;
}
.btns{margin-top:30px}
.btns a{
  display:inline-block;
  margin-right:12px;
  padding:14px 22px;
  border-radius:8px;
  text-decoration:none;
  color:white;
  border:1px solid #00f7ff;
  box-shadow:0 0 20px #00f7ff44;
}
.btns a:first-child{
  background:linear-gradient(135deg,#00f7ff,#ff2f8b);
  border:none;
}

.profile-box{
  position:relative;
  display:flex;
  justify-content:center;
  align-items:center;
}
.profile-frame{
  width:330px;
  height:430px;
  border:1px solid #00f7ff;
  border-radius:28px;
  background:linear-gradient(180deg,#07162f,#11051d);
  box-shadow:0 0 60px #00f7ff55;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  overflow:hidden;
}
.profile-frame::before{
  content:"HEND.SYSTEM";
  position:absolute;
  top:18px;
  left:20px;
  color:#00f7ff;
  font-size:12px;
  letter-spacing:2px;
}
.profile-frame::after{
  content:"未来を創る";
  position:absolute;
  right:18px;
  bottom:25px;
  color:#ff2f8b;
  writing-mode:vertical-rl;
  letter-spacing:6px;
}
.profile-frame img{
  width:230px;
  height:230px;
  object-fit:cover;
  border-radius:50%;
  border:3px solid #00f7ff;
  box-shadow:0 0 40px #00f7ff;
  z-index:2;
}

h2{
  color:#00f7ff;
  text-align:center;
  margin:70px 0 35px;
  font-size:36px;
  letter-spacing:5px;
  text-shadow:0 0 20px #00f7ff;
}
section{padding:50px 7%}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
  gap:24px;
}
.card{
  background:rgba(255,255,255,.06);
  border:1px solid #00f7ff55;
  border-radius:20px;
  padding:26px;
  box-shadow:0 0 25px #00f7ff22;
  transition:.3s;
}
.card:hover{
  transform:translateY(-10px);
  box-shadow:0 0 35px #ff2f8b66;
  border-color:#ff2f8b;
}
.card h3{color:#ff2f8b;margin-bottom:12px}
.card p{color:#ddd;line-height:1.7}

.gallery img{
  width:100%;
  height:280px;
  object-fit:cover;
  border-radius:18px;
  border:1px solid #00f7ff66;
  transition:.3s;
}
.gallery img:hover{
  transform:scale(1.04);
  box-shadow:0 0 35px #00f7ff;
}
.contact a{
  display:block;
  color:white;
  text-decoration:none;
  border:1px solid #00f7ff55;
  padding:15px;
  margin:12px 0;
  border-radius:12px;
}
.sakura{
  position:fixed;
  top:-20px;
  color:#ff9ccc;
  animation:fall linear infinite;
  z-index:10;
  opacity:.75;
  pointer-events:none;
}
@keyframes fall{
  to{transform:translateY(110vh) translateX(80px) rotate(360deg)}
}
footer{text-align:center;padding:30px;color:#aaa}

@media(max-width:800px){
  nav{padding:15px 5%}
  nav div:last-child{display:none}
  .hero{
    grid-template-columns:1fr;
    text-align:center;
    padding-top:100px;
  }
  .hero-text{text-align:center}
  .hero p{margin:auto}
  .profile-frame{
    width:280px;
    height:360px;
  }
}
</style>
